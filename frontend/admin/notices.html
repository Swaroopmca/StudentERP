<!DOCTYPE html>
<html>
<head>
    <title>Manage Notices - Admin</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="navbar">
        <a href="dashboard.html">Dashboard</a>
        <a href="students.html">Students</a>
        <a href="teachers.html">Teachers</a>
        <a href="courses.html">Courses</a>
        <a href="subjects.html">Subjects</a>
        <a href="fees.html">Fees</a>
        <a href="notices.html">Notices</a>
        <a href="reports.html">Reports</a>
        <a href="../login.html" style="float:right;">Logout</a>
    </div>
    
    <div class="container">
        <h2>Manage Notices</h2>
        
        <button onclick="showAddNoticeForm()">Post New Notice</button>
        
        <div id="noticeForm" style="display:none; border:1px solid #ccc; padding:20px; margin:20px 0;">
            <h3 id="formTitle">Post Notice</h3>
            <form id="noticeFormElement">
                <input type="hidden" id="noticeId">
                
                <div>
                    <label>Title:</label>
                    <input type="text" id="title" required style="width:400px;">
                </div>
                
                <div>
                    <label>Content:</label>
                    <textarea id="content" rows="6" style="width:400px;" required></textarea>
                </div>
                
                <div>
                    <label>Target Audience:</label>
                    <select id="targetRole">
                        <option value="ALL">Everyone</option>
                        <option value="STUDENT">Students Only</option>
                        <option value="TEACHER">Teachers Only</option>
                    </select>
                </div>
                
                <button type="submit">Post</button>
                <button type="button" onclick="hideNoticeForm()">Cancel</button>
            </form>
        </div>
        
        <div id="noticesList"></div>
    </div>
    
    <script src="../js/api.js"></script>
    <script>
        // Load notices
        async function loadNotices() {
            try {
                const notices = await apiCall('/notices');
                displayNotices(notices);
            } catch (err) {
                console.error('Failed to load notices:', err);
            }
        }
        
        function displayNotices(notices) {
            const container = document.getElementById('noticesList');
            container.innerHTML = '';
            
            notices.sort((a, b) => new Date(b.postedAt) - new Date(a.postedAt));
            
            notices.forEach(notice => {
                const noticeDiv = document.createElement('div');
                noticeDiv.style.cssText = 'border:1px solid #ddd; padding:15px; margin:10px 0; border-radius:5px;';
                
                const targetBadge = notice.targetRole === 'ALL' ? 'Everyone' : 
                                   notice.targetRole === 'STUDENT' ? 'Students Only' : 'Teachers Only';
                
                noticeDiv.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h3 style="margin:0;">${notice.title}</h3>
                        <div>
                            <button class="edit" onclick="editNotice(${notice.id})">Edit</button>
                            <button class="delete" onclick="deleteNotice(${notice.id})">Delete</button>
                        </div>
                    </div>
                    <p style="margin:10px 0; white-space:pre-wrap;">${notice.content}</p>
                    <div style="display:flex; justify-content:space-between; color:#666; font-size:12px;">
                        <span>Target: ${targetBadge}</span>
                        <span>Posted: ${new Date(notice.postedAt).toLocaleString()}</span>
                    </div>
                `;
                
                container.appendChild(noticeDiv);
            });
        }
        
        function showAddNoticeForm() {
            document.getElementById('noticeForm').style.display = 'block';
            document.getElementById('formTitle').textContent = 'Post New Notice';
            document.getElementById('noticeFormElement').reset();
            document.getElementById('noticeId').value = '';
        }
        
        function hideNoticeForm() {
            document.getElementById('noticeForm').style.display = 'none';
        }
        
        async function editNotice(id) {
            try {
                const notice = await apiCall('/notices/' + id);
                
                document.getElementById('noticeId').value = notice.id;
                document.getElementById('title').value = notice.title;
                document.getElementById('content').value = notice.content;
                document.getElementById('targetRole').value = notice.targetRole;
                
                document.getElementById('formTitle').textContent = 'Edit Notice';
                document.getElementById('noticeForm').style.display = 'block';
            } catch (err) {
                console.error('Failed to load notice:', err);
                alert('Failed to load notice details');
            }
        }
        
        async function deleteNotice(id) {
            if (!confirm('Are you sure you want to delete this notice?')) {
                return;
            }
            
            try {
                await apiCall('/notices/' + id, 'DELETE');
                alert('Notice deleted successfully');
                loadNotices();
            } catch (err) {
                console.error('Failed to delete notice:', err);
                alert('Failed to delete notice');
            }
        }
        
        document.getElementById('noticeFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('noticeId').value;
            const noticeData = {
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                targetRole: document.getElementById('targetRole').value
            };
            
            try {
                if (id) {
                    await apiCall('/notices/' + id, 'PUT', noticeData);
                } else {
                    await apiCall('/notices', 'POST', noticeData);
                }
                
                hideNoticeForm();
                loadNotices();
                alert('Notice posted successfully');
            } catch (err) {
                console.error('Failed to save notice:', err);
                alert('Failed to post notice');
            }
        });
        
        // Initial load
        loadNotices();
    </script>
</body>
</html>

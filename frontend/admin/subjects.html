<!DOCTYPE html>
<html>
<head>
    <title>Manage Subjects - Admin</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="navbar">
        <a href="dashboard.html">Dashboard</a>
        <a href="students.html">Students</a>
        <a href="teachers.html">Teachers</a>
        <a href="courses.html">Courses</a>
        <a href="subjects.html">Subjects</a>
        <a href="fees.html">Fees</a>
        <a href="notices.html">Notices</a>
        <a href="reports.html">Reports</a>
        <a href="../login.html" style="float:right;">Logout</a>
    </div>
    
    <div class="container">
        <h2>Manage Subjects</h2>
        
        <button onclick="showAddSubjectForm()">Add New Subject</button>
        
        <div id="subjectForm" style="display:none; border:1px solid #ccc; padding:20px; margin:20px 0;">
            <h3 id="formTitle">Add Subject</h3>
            <form id="subjectFormElement">
                <input type="hidden" id="subjectId">
                
                <div>
                    <label>Subject Name:</label>
                    <input type="text" id="name" required>
                </div>
                
                <div>
                    <label>Subject Code:</label>
                    <input type="text" id="code" required>
                </div>
                
                <div>
                    <label>Credits:</label>
                    <input type="number" id="credits" required>
                </div>
                
                <div>
                    <label>Course:</label>
                    <select id="courseId" required>
                        <option value="">Select Course</option>
                    </select>
                </div>
                
                <div>
                    <label>Teacher:</label>
                    <select id="teacherId">
                        <option value="">Select Teacher</option>
                    </select>
                </div>
                
                <button type="submit">Save</button>
                <button type="button" onclick="hideSubjectForm()">Cancel</button>
            </form>
        </div>
        
        <table id="subjectsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Code</th>
                    <th>Credits</th>
                    <th>Course</th>
                    <th>Teacher</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    
    <script src="../js/api.js"></script>
    <script>
        // Load courses and teachers for dropdowns
        async function loadDropdowns() {
            try {
                const [courses, teachers] = await Promise.all([
                    apiCall('/courses'),
                    apiCall('/teachers')
                ]);
                
                const courseSelect = document.getElementById('courseId');
                courseSelect.innerHTML = '<option value="">Select Course</option>';
                courses.forEach(course => {
                    const option = document.createElement('option');
                    option.value = course.id;
                    option.textContent = course.name;
                    courseSelect.appendChild(option);
                });
                
                const teacherSelect = document.getElementById('teacherId');
                teacherSelect.innerHTML = '<option value="">Select Teacher</option>';
                teachers.forEach(teacher => {
                    const option = document.createElement('option');
                    option.value = teacher.id;
                    option.textContent = teacher.firstName + ' ' + teacher.lastName;
                    teacherSelect.appendChild(option);
                });
            } catch (err) {
                console.error('Failed to load dropdowns:', err);
            }
        }
        
        // Load subjects
        async function loadSubjects() {
            try {
                const subjects = await apiCall('/subjects');
                const tbody = document.querySelector('#subjectsTable tbody');
                tbody.innerHTML = '';
                
                for (const subject of subjects) {
                    const row = tbody.insertRow();
                    row.insertCell().textContent = subject.id;
                    row.insertCell().textContent = subject.name;
                    row.insertCell().textContent = subject.code;
                    row.insertCell().textContent = subject.credits;
                    row.insertCell().textContent = subject.course ? subject.course.name : '-';
                    row.insertCell().textContent = subject.teacher ? 
                        subject.teacher.firstName + ' ' + subject.teacher.lastName : 'Not Assigned';
                    
                    const actions = row.insertCell();
                    actions.innerHTML = `
                        <button class="edit" onclick="editSubject(${subject.id})">Edit</button>
                        <button class="delete" onclick="deleteSubject(${subject.id})">Delete</button>
                    `;
                }
            } catch (err) {
                console.error('Failed to load subjects:', err);
            }
        }
        
        function showAddSubjectForm() {
            document.getElementById('subjectForm').style.display = 'block';
            document.getElementById('formTitle').textContent = 'Add Subject';
            document.getElementById('subjectFormElement').reset();
            document.getElementById('subjectId').value = '';
            loadDropdowns();
        }
        
        function hideSubjectForm() {
            document.getElementById('subjectForm').style.display = 'none';
        }
        
        async function editSubject(id) {
            try {
                const [subject, courses, teachers] = await Promise.all([
                    apiCall('/subjects/' + id),
                    apiCall('/courses'),
                    apiCall('/teachers')
                ]);
                
                // Populate dropdowns
                const courseSelect = document.getElementById('courseId');
                courseSelect.innerHTML = '<option value="">Select Course</option>';
                courses.forEach(course => {
                    const option = document.createElement('option');
                    option.value = course.id;
                    option.textContent = course.name;
                    if (subject.course && subject.course.id === course.id) {
                        option.selected = true;
                    }
                    courseSelect.appendChild(option);
                });
                
                const teacherSelect = document.getElementById('teacherId');
                teacherSelect.innerHTML = '<option value="">Select Teacher</option>';
                teachers.forEach(teacher => {
                    const option = document.createElement('option');
                    option.value = teacher.id;
                    option.textContent = teacher.firstName + ' ' + teacher.lastName;
                    if (subject.teacher && subject.teacher.id === teacher.id) {
                        option.selected = true;
                    }
                    teacherSelect.appendChild(option);
                });
                
                document.getElementById('subjectId').value = subject.id;
                document.getElementById('name').value = subject.name;
                document.getElementById('code').value = subject.code;
                document.getElementById('credits').value = subject.credits;
                
                document.getElementById('formTitle').textContent = 'Edit Subject';
                document.getElementById('subjectForm').style.display = 'block';
            } catch (err) {
                console.error('Failed to load subject:', err);
                alert('Failed to load subject details');
            }
        }
        
        async function deleteSubject(id) {
            if (!confirm('Are you sure you want to delete this subject?')) {
                return;
            }
            
            try {
                await apiCall('/subjects/' + id, 'DELETE');
                alert('Subject deleted successfully');
                loadSubjects();
            } catch (err) {
                console.error('Failed to delete subject:', err);
                alert('Failed to delete subject');
            }
        }
        
        document.getElementById('subjectFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('subjectId').value;
            const subjectData = {
                name: document.getElementById('name').value,
                code: document.getElementById('code').value,
                credits: parseInt(document.getElementById('credits').value),
                course: { id: parseInt(document.getElementById('courseId').value) },
                teacher: document.getElementById('teacherId').value ? 
                    { id: parseInt(document.getElementById('teacherId').value) } : null
            };
            
            try {
                if (id) {
                    await apiCall('/subjects/' + id, 'PUT', subjectData);
                } else {
                    await apiCall('/subjects', 'POST', subjectData);
                }
                
                hideSubjectForm();
                loadSubjects();
                alert('Subject saved successfully');
            } catch (err) {
                console.error('Failed to save subject:', err);
                alert('Failed to save subject');
            }
        });
        
        // Initial loads
        loadSubjects();
    </script>
</body>
</html>

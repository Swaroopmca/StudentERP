<!DOCTYPE html>
<html>
<head>
    <title>Manage Teachers - Admin</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="navbar">
        <a href="dashboard.html">Dashboard</a>
        <a href="students.html">Students</a>
        <a href="teachers.html">Teachers</a>
        <a href="courses.html">Courses</a>
        <a href="subjects.html">Subjects</a>
        <a href="fees.html">Fees</a>
        <a href="notices.html">Notices</a>
        <a href="reports.html">Reports</a>
        <a href="../login.html" style="float:right;">Logout</a>
    </div>
    
    <div class="container">
        <h2>Manage Teachers</h2>
        
        <button onclick="showAddTeacherForm()">Add New Teacher</button>
        
        <div id="teacherForm" style="display:none; border:1px solid #ccc; padding:20px; margin:20px 0;">
            <h3 id="formTitle">Add Teacher</h3>
            <form id="teacherFormElement">
                <input type="hidden" id="teacherId">
                
                <div>
                    <label>First Name:</label>
                    <input type="text" id="firstName" required>
                </div>
                
                <div>
                    <label>Last Name:</label>
                    <input type="text" id="lastName" required>
                </div>
                
                <div>
                    <label>Email:</label>
                    <input type="email" id="email" required>
                </div>
                
                <div>
                    <label>Phone:</label>
                    <input type="text" id="phone">
                </div>
                
                <div>
                    <label>Hire Date:</label>
                    <input type="date" id="hireDate">
                </div>
                
                <div>
                    <label>Username:</label>
                    <input type="text" id="username" required>
                </div>
                
                <div>
                    <label>Password:</label>
                    <input type="password" id="password">
                    <small>Leave blank to keep current password when editing</small>
                </div>
                
                <button type="submit">Save</button>
                <button type="button" onclick="hideTeacherForm()">Cancel</button>
            </form>
        </div>
        
        <table id="teachersTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Hire Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    
    <script src="../js/api.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        // Load teachers
        async function loadTeachers() {
            try {
                const teachers = await apiCall('/teachers');
                const tbody = document.querySelector('#teachersTable tbody');
                tbody.innerHTML = '';
                
                teachers.forEach(teacher => {
                    const row = tbody.insertRow();
                    row.insertCell().textContent = teacher.id;
                    row.insertCell().textContent = teacher.firstName + ' ' + teacher.lastName;
                    row.insertCell().textContent = teacher.email;
                    row.insertCell().textContent = teacher.phone || '-';
                    row.insertCell().textContent = teacher.hireDate || '-';
                    
                    const actions = row.insertCell();
                    actions.innerHTML = `
                        <button class="edit" onclick="editTeacher(${teacher.id})">Edit</button>
                        <button class="delete" onclick="deleteTeacher(${teacher.id})">Delete</button>
                    `;
                });
            } catch (err) {
                console.error('Failed to load teachers:', err);
            }
        }
        
        function showAddTeacherForm() {
            document.getElementById('teacherForm').style.display = 'block';
            document.getElementById('formTitle').textContent = 'Add Teacher';
            document.getElementById('teacherFormElement').reset();
            document.getElementById('teacherId').value = '';
            document.getElementById('password').required = true;
        }
        
        function hideTeacherForm() {
            document.getElementById('teacherForm').style.display = 'none';
        }
        
        async function editTeacher(id) {
            try {
                const teacher = await apiCall('/teachers/' + id);
                
                document.getElementById('teacherId').value = teacher.id;
                document.getElementById('firstName').value = teacher.firstName;
                document.getElementById('lastName').value = teacher.lastName;
                document.getElementById('email').value = teacher.email;
                document.getElementById('phone').value = teacher.phone || '';
                document.getElementById('hireDate').value = teacher.hireDate || '';
                document.getElementById('username').value = teacher.user ? teacher.user.username : '';
                
                document.getElementById('password').required = false;
                document.getElementById('formTitle').textContent = 'Edit Teacher';
                document.getElementById('teacherForm').style.display = 'block';
            } catch (err) {
                console.error('Failed to load teacher:', err);
                alert('Failed to load teacher details');
            }
        }
        
        async function deleteTeacher(id) {
            if (!confirm('Are you sure you want to delete this teacher?')) {
                return;
            }
            
            try {
                await apiCall('/teachers/' + id, 'DELETE');
                alert('Teacher deleted successfully');
                loadTeachers();
            } catch (err) {
                console.error('Failed to delete teacher:', err);
                alert('Failed to delete teacher');
            }
        }
        
        document.getElementById('teacherFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('teacherId').value;
            const teacherData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                hireDate: document.getElementById('hireDate').value,
                user: {
                    username: document.getElementById('username').value,
                    role: 'TEACHER'
                }
            };
            
            // Add password only if provided
            const password = document.getElementById('password').value;
            if (password) {
                teacherData.user.password = password;
            }
            
            try {
                if (id) {
                    await apiCall('/teachers/' + id, 'PUT', teacherData);
                } else {
                    await apiCall('/teachers', 'POST', teacherData);
                }
                
                hideTeacherForm();
                loadTeachers();
                alert('Teacher saved successfully');
            } catch (err) {
                console.error('Failed to save teacher:', err);
                alert('Failed to save teacher');
            }
        });
        
        // Initial load
        loadTeachers();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>My Fees - Student</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="navbar">
        <a href="dashboard.html">Dashboard</a>
        <a href="profile.html">Profile</a>
        <a href="attendance.html">Attendance</a>
        <a href="results.html">Results</a>
        <a href="fees.html">Fees</a>
        <a href="notices.html">Notices</a>
        <a href="../login.html" style="float:right;">Logout</a>
    </div>

    <div class="container">
        <h2>My Fees</h2>

        <div style="display:flex; gap:20px; margin-bottom:20px;">
            <div style="background:#4CAF50; color:white; padding:15px; border-radius:5px;">
                <h3>Total Paid</h3>
                <p id="totalPaid" style="font-size:24px;">₹0</p>
            </div>
            <div style="background:#f44336; color:white; padding:15px; border-radius:5px;">
                <h3>Total Due</h3>
                <p id="totalDue" style="font-size:24px;">₹0</p>
            </div>
        </div>

        <table id="feesTable">
            <thead>
                <tr>
                    <th>Fee Type</th>
                    <th>Amount</th>
                    <th>Due Date</th>
                    <th>Paid Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="../js/api.js"></script>
    <script>
        async function loadFees() {
            try {
                const fees = await apiCall('/fees/student/me');
                const tbody = document.querySelector('#feesTable tbody');
                tbody.innerHTML = '';

                let totalPaid = 0, totalDue = 0;

                fees.forEach(f => {
                    const row = tbody.insertRow();
                    row.insertCell().textContent = f.feeType;
                    row.insertCell().textContent = '₹' + f.amount;
                    row.insertCell().textContent = f.dueDate || '-';
                    row.insertCell().textContent = f.paidDate || '-';
                    row.insertCell().innerHTML = `<span class="status-badge status-${f.status.toLowerCase()}">${f.status}</span>`;

                    if (f.status === 'PAID') totalPaid += f.amount;
                    else totalDue += f.amount;
                });

                document.getElementById('totalPaid').textContent = '₹' + totalPaid;
                document.getElementById('totalDue').textContent = '₹' + totalDue;

                if (fees.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5">No fee records found.</td></tr>';
                }
            } catch (err) {
                console.error('Failed to load fees:', err);
            }
        }
        loadFees();
    </script>
</body>
</html>
